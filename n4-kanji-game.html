<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JLPT N4 학습 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#D94F3D;--rlt:#FDF0EE;--rdk:#A02818;
  --blue:#2A5FA0;--blt:#EEF3FB;
  --ink:#1A1410;--imid:#4A3C30;--ilt:#8A7060;
  --paper:#FDFAF5;--pw:#F5F0E6;--pd:#EDE5D8;
  --gold:#C8A040;--grn:#2D7A4A;
  --sh:rgba(100,60,30,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);font-family:'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif;min-height:100vh;color:var(--ink);overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .15s}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── 홈 ── */
.hero{padding:34px 18px 20px;text-align:center;
  background:linear-gradient(160deg,#fff 0%,var(--pw) 100%);
  border-bottom:3px solid var(--red);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--rdk),var(--red),var(--gold),var(--red),var(--rdk))}
.h-eye{font-family:'Noto Sans KR',sans-serif;font-size:10px;letter-spacing:4px;color:var(--red);margin-bottom:7px;font-weight:600}
.h-ttl{font-size:25px;font-weight:700}
.h-ttl b{color:var(--red)}
.h-sub{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--ilt);margin-top:4px}
.h-stats{display:flex;justify-content:center;gap:18px;margin-top:14px;padding-top:13px;border-top:1px solid var(--pd)}
.hs{text-align:center}
.hs-n{font-size:19px;font-weight:700}
.hs-l{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ilt);margin-top:1px}

.hbody{padding:14px 13px 50px;max-width:520px;margin:0 auto;width:100%}

/* 레슨카드 */
.lc{background:white;border-radius:16px;border:1.5px solid var(--pd);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px var(--sh)}
.lc-h{padding:13px 15px 10px;border-bottom:1px solid var(--pd)}
.lc-row{display:flex;justify-content:space-between;align-items:center}
.lc-nm{font-size:13px;font-weight:700}
.lc-bg{font-family:'Noto Sans KR',sans-serif;font-size:10px;background:var(--pw);padding:2px 8px;border-radius:20px;color:var(--ilt)}
.lc-bar{height:3px;background:var(--pd);border-radius:2px;margin-top:7px;overflow:hidden}
.lc-fill{height:100%;background:var(--grn);border-radius:2px;transition:width .8s}

/* 섹션 */
.sect{padding:11px 14px}
.sect+.sect{border-top:1px solid var(--pd)}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.si{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.si.v{background:var(--blt);color:var(--blue)}
.si.k{background:var(--rlt);color:var(--red)}
.st{font-size:13px;font-weight:700}
.sc{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ilt);margin-left:auto}
.sp{font-family:'Noto Sans KR',sans-serif;font-size:11px;margin-left:5px;font-weight:700}
.sp.v{color:var(--blue)}
.sp.k{color:var(--red)}

/* 모드버튼 */
.mbg{display:grid;gap:6px}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.mb{padding:9px 3px;border-radius:10px;font-size:11px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;border:1.5px solid transparent;text-align:center}
.mb:active{transform:scale(.96)}
.mv-f{background:var(--blue);color:white}
.mv-r{color:var(--blue);border-color:var(--blue)}
.mv-m{color:var(--grn);border-color:var(--grn)}
.mv-h{color:#7B3FA0;border-color:#7B3FA0}
.mv-hm{color:#C05C00;border-color:#C05C00}
.mk-f{background:var(--red);color:white}
.mk-o{color:var(--red);border-color:var(--red)}
.mk-k{color:#8B4A00;border-color:#C8803A}
.mk-m{color:var(--grn);border-color:var(--grn)}

/* ── 공통 탑바 ── */
.topbar{background:white;padding:11px 13px;display:flex;align-items:center;gap:9px;
  border-bottom:2px solid;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px var(--sh)}
.topbar.v{border-color:var(--blue)}
.topbar.k{border-color:var(--red)}
.btn-bk{background:none;color:var(--ilt);font-size:20px;padding:4px;min-width:30px}
.tb-i{flex:1}
.tb-t{font-size:14px;font-weight:700}
.tb-s{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ilt);margin-top:1px}
.tb-sc{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.tb-sc.v{background:var(--blt);color:var(--blue)}
.tb-sc.k{background:var(--rlt);color:var(--red)}
.pt{height:3px}
.pt.v{background:var(--blt)}
.pt.k{background:var(--rlt)}
.ptf{height:100%;transition:width .3s}
.ptf.v{background:var(--blue)}
.ptf.k{background:var(--red)}

/* ── 플래시카드 ── */
.fb{padding:14px 13px;max-width:500px;margin:0 auto;width:100%;flex:1}
.ctr{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--ilt);text-align:center;margin-bottom:9px}
.cw{perspective:1400px;cursor:pointer;margin-bottom:11px}
.ci{position:relative;height:290px;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.ci.flipped{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:22px 18px;box-shadow:0 8px 36px var(--sh)}
.cf-fr{background:white;border:2px solid var(--pd)}
.cf-bk{transform:rotateY(180deg)}
.cf-bk.v{background:var(--pw);border:2px solid var(--blue)}
.cf-bk.k{background:var(--pw);border:2px solid var(--red)}

/* 앞면 */
.c-tag{position:absolute;top:12px;left:12px;font-family:'Noto Sans KR',sans-serif;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.c-tag.v{background:var(--blue);color:white}
.c-tag.k{background:var(--red);color:white}
.c-word{font-size:64px;color:var(--ink);line-height:1;font-family:'Noto Serif JP',serif;font-weight:400}
.c-word.sm{font-size:38px}
.c-word.kanji1{font-size:90px}
.c-tap{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ilt);margin-top:13px;letter-spacing:1px}

/* 뒷면 공통 */
/* 한자 이름 (빛 광, 불 화 스타일) */
.ko-name{
  font-family:'Noto Sans KR',sans-serif;
  font-size:28px;font-weight:700;color:var(--red);
  letter-spacing:3px;margin-bottom:8px;
  background:var(--rlt);padding:6px 20px;border-radius:12px;
}
.c-wb{font-family:'Noto Serif JP',serif;color:var(--ink);line-height:1;margin-bottom:6px}
.c-wb.v{font-size:36px}
.c-wb.k{font-size:58px}
.c-read{font-size:21px;font-weight:700;margin-bottom:4px}
.c-read.v{color:var(--blue)}
.c-read.k{color:var(--red)}
.c-mean{font-family:'Noto Sans KR',sans-serif;font-size:16px;color:var(--imid);font-weight:600;margin-bottom:9px}
.rtags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
.rt{padding:3px 9px;border-radius:20px;font-size:11px;font-family:'Noto Serif JP',serif}
.rt-on{background:var(--rlt);color:var(--red);border:1px solid rgba(217,79,61,.3)}
.rt-kun{background:#FFF4E8;color:#8B4A00;border:1px solid rgba(200,120,50,.3)}
/* 연상 힌트 박스 */
.hint-box{width:100%;background:rgba(200,160,64,.08);border:1px dashed var(--gold);
  border-radius:10px;padding:8px 12px;font-size:12px;color:var(--imid);
  font-family:'Noto Sans KR',sans-serif;line-height:1.8;text-align:center}
.hint-box b{color:var(--gold)}
/* 단어의 출처 표시 */
.c-from{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ilt);margin-top:4px}

/* 마킹 버튼 */
.mark-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.btn-k{padding:12px;border-radius:11px;font-size:13px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  background:rgba(45,122,74,.07);color:var(--grn);border:1.5px solid rgba(45,122,74,.3)}
.btn-dk{padding:12px;border-radius:11px;font-size:13px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  background:rgba(217,79,61,.07);color:var(--red);border:1.5px solid rgba(217,79,61,.3)}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-nv{padding:10px;border-radius:10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;
  background:white;color:var(--ilt);border:1.5px solid var(--pd)}
.btn-nv:disabled{opacity:.3;cursor:not-allowed}

/* ── 퀴즈 ── */
.qb{padding:13px 13px;max-width:500px;margin:0 auto;width:100%;flex:1}
.combo{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--gold);font-weight:700;
  text-align:center;min-height:18px;margin-bottom:7px}
.qcard{background:white;border:2px solid var(--pd);border-radius:20px;
  padding:24px 18px;text-align:center;margin-bottom:13px;box-shadow:0 6px 28px var(--sh)}
.qtype{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:600;
  color:var(--ilt);letter-spacing:2px;margin-bottom:9px}
.qword{font-size:68px;color:var(--ink);line-height:1;font-family:'Noto Serif JP',serif;font-weight:400}
.qword.sm{font-size:36px}
.qread{font-size:22px;font-weight:700;margin-top:4px;font-family:'Noto Serif JP',serif}
.qread.v{color:var(--blue)}
.qread.k{color:var(--red)}
.qsub{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--ilt);margin-top:5px}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.qopt{padding:14px 8px;border-radius:12px;font-size:13px;font-weight:700;
  font-family:'Noto Serif JP',serif;background:white;color:var(--ink);
  border:1.5px solid var(--pd);transition:all .15s;line-height:1.3}
.qopt:active{transform:scale(.97)}
.qopt.correct{background:rgba(45,122,74,.1);color:var(--grn);border-color:var(--grn)}
.qopt.wrong{background:rgba(217,79,61,.1);color:var(--red);border-color:var(--red)}
.qfb{background:white;border-radius:12px;padding:12px 14px;
  margin-bottom:10px;border-left:4px solid;box-shadow:0 2px 10px var(--sh)}
.qfb-t{font-weight:700;font-size:14px;margin-bottom:5px}
.qfb-d{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--ilt);line-height:1.8}
.qfb-hint{margin-top:7px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--imid);
  background:rgba(200,160,64,.09);padding:5px 9px;border-radius:8px;border:1px dashed var(--gold)}
.btn-nx{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;color:white}
.btn-nx.v{background:var(--blue)}
.btn-nx.k{background:var(--red)}

/* ── 결과 ── */
.resb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;text-align:center;max-width:400px;margin:0 auto;width:100%}
.res-em{font-size:58px;margin-bottom:13px}
.res-ttl{font-size:23px;font-weight:700;margin-bottom:4px}
.res-sc{font-size:44px;font-weight:700;margin-bottom:4px}
.res-sub{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--ilt);margin-bottom:22px}
.res-btns{display:flex;flex-direction:column;gap:8px;width:100%}
.btn-re{padding:13px;border-radius:12px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;color:white}
.btn-re.v{background:var(--blue)}
.btn-re.k{background:var(--red)}
.btn-hm{padding:13px;border-radius:12px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;background:white;color:var(--ink);border:1.5px solid var(--pd)}

/* ── 과 선택 탭 ── */
.tab-wrap{
  display:flex;overflow-x:auto;gap:8px;padding:12px 14px 0;
  background:white;border-bottom:2px solid var(--pd);
  scrollbar-width:none;
}
.tab-wrap::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;min-width:72px;padding:8px 12px;border-radius:10px 10px 0 0;
  background:var(--pw);border:1.5px solid var(--pd);border-bottom:none;
  text-align:center;font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  transition:all .15s;
}
.tab-btn:active{opacity:.7}
.tab-active{background:white;border-color:var(--red);border-bottom:2px solid white;margin-bottom:-2px;z-index:1}
.tab-n{font-size:14px;font-weight:700;color:var(--ink)}
.tab-active .tab-n{color:var(--red)}
.tab-sub{font-size:9px;color:var(--ilt);margin-top:1px}
.tab-p{font-size:11px;font-weight:700;color:var(--gold);margin-top:2px}

@keyframes popIn{0%{transform:scale(.75);opacity:0}80%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pop{animation:popIn .22s ease both}
.shake{animation:shake .28s ease}
</style>
</head>
<body>

<!-- 홈 -->
<div id="screen-home" class="screen active">
  <div class="hero">
    <div class="h-eye">JLPT N4 · 漢字읽기 기출어휘</div>
    <div class="h-ttl">N4 <b>学習</b>ゲーム</div>
    <div class="h-sub">단어 학습 ↔ 한자 1자 학습을 분리하여 집중 훈련</div>
    <div class="h-stats">
      <div class="hs"><div class="hs-n" style="color:var(--blue)" id="h-vt">0</div><div class="hs-l">단어수</div></div>
      <div class="hs"><div class="hs-n" style="color:var(--red)" id="h-kt">0</div><div class="hs-l">한자수</div></div>
      <div class="hs"><div class="hs-n" style="color:var(--grn)" id="h-kn">0</div><div class="hs-l">암기완료</div></div>
      <div class="hs"><div class="hs-n" style="color:var(--gold)" id="h-pc">0%</div><div class="hs-l">달성률</div></div>
    </div>
  </div>
  <!-- 과 선택 탭 -->
  <div class="tab-wrap" id="lesson-tabs"></div>
  <div class="hbody" id="home-body"></div>
</div>

<!-- 플래시카드 -->
<div id="screen-flash" class="screen">
  <div class="topbar" id="fl-tb">
    <button class="btn-bk" onclick="goHome()">←</button>
    <div class="tb-i">
      <div class="tb-t" id="fl-t"></div>
      <div class="tb-s" id="fl-s"></div>
    </div>
    <div class="tb-sc" id="fl-sc"></div>
  </div>
  <div class="pt" id="fl-pt"><div class="ptf" id="fl-pf"></div></div>
  <div class="fb">
    <div class="ctr" id="fl-ctr"></div>
    <div class="cw" id="cw" onclick="flipCard()">
      <div class="ci" id="ci">
        <div class="cf cf-fr" id="cf-fr"></div>
        <div class="cf" id="cf-bk"></div>
      </div>
    </div>
    <div id="mark-a" style="display:none">
      <div class="mark-row">
        <button class="btn-dk" onclick="markWord(false)">✗ 모르겠어</button>
        <button class="btn-k" onclick="markWord(true)">✓ 알았어!</button>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-nv" id="bn-p" onclick="prevCard()">← 이전</button>
      <button class="btn-nv" id="bn-n" onclick="nextCard()">다음 →</button>
    </div>
  </div>
</div>

<!-- 퀴즈 -->
<div id="screen-quiz" class="screen">
  <div class="topbar" id="qz-tb">
    <button class="btn-bk" onclick="goHome()">←</button>
    <div class="tb-i">
      <div class="tb-t" id="qz-t"></div>
      <div class="tb-s" id="qz-s"></div>
    </div>
    <div class="tb-sc" id="qz-sc"></div>
  </div>
  <div class="pt" id="qz-pt"><div class="ptf" id="qz-pf"></div></div>
  <div class="qb">
    <div class="combo" id="combo"></div>
    <div class="qcard" id="qcard">
      <div class="qtype" id="qtype"></div>
      <div class="qword" id="qword"></div>
      <div class="qread" id="qread"></div>
      <div class="qsub" id="qsub"></div>
    </div>
    <div class="qopts" id="qopts"></div>
    <div class="qfb" id="qfb" style="display:none"></div>
    <button class="btn-nx" id="btn-nx" onclick="nextQuiz()" style="display:none">다음 →</button>
  </div>
</div>

<!-- 결과 -->
<div id="screen-result" class="screen">
  <div class="topbar k"><button class="btn-bk" onclick="goHome()">←</button>
    <div class="tb-i"><div class="tb-t">결과</div></div></div>
  <div class="resb">
    <div class="res-em" id="r-em">🎉</div>
    <div class="res-ttl" id="r-tt">완료!</div>
    <div class="res-sc" id="r-sc">0점</div>
    <div class="res-sub" id="r-sb"></div>
    <div class="res-btns">
      <button class="btn-re" id="btn-re" onclick="retryLast()">다시 도전 🔄</button>
      <button class="btn-hm" onclick="goHome()">홈으로</button>
    </div>
  </div>
</div>

<script>
// ================================================================

// ================================================================
const VOCAB=[

{w:"一度",r:"いちど",m:"한 번",l:1},
{w:"以外",r:"いがい",m:"이외",l:1},

{w:"教える",r:"おしえる",m:"가르치다",l:1},

/* か */
{w:"会場",r:"かいじょう",m:"회장·행사장",l:1},
{w:"顔",r:"かお",m:"얼굴",l:1},
{w:"数える",r:"かぞえる",m:"세다",l:1},

  const kn=vk+kk, tot=allV.length+allK.length;
  document.getElementById("h-vt").textContent=allV.length;
  document.getElementById("h-kt").textContent=allK.length;
  document.getElementById("h-kn").textContent=kn;
  document.getElementById("h-pc").textContent=Math.round(kn/tot*100)+"%";

  // 과 탭 렌더
  const tabsHtml=Object.entries(LESSONS).map(([id,ln])=>{
    const lid=+id;
    const vs=voc(lid), ks=kan(lid);
    const k2=vs.filter(x=>ok(x.w)).length+ks.filter(x=>ok(x.k)).length;
    const t2=vs.length+ks.length;
    const p2=t2?Math.round(k2/t2*100):0;
    const active=lid===S.curLesson;
    return`<button class="tab-btn ${active?"tab-active":""}" onclick="selectLesson(${lid})">
      <div class="tab-n">${id}과</div>
      <div class="tab-sub">${ln.sub}</div>
      <div class="tab-p">${p2}%</div>
    </button>`;
  }).join("");
  document.getElementById("lesson-tabs").innerHTML=tabsHtml;
  renderLessonDetail(S.curLesson);
}

function selectLesson(lid){
  S.curLesson=lid;

}

function showScr(n){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById("screen-"+n).classList.add("active");}
function goHome(){showScr("home");renderHome();}

function setTB(scr,col,ttl,sub,scTxt){
  const tb=document.getElementById(scr+"-tb");
  tb.className="topbar "+col;
  ["pt","pf"].forEach(x=>{document.getElementById(scr+"-"+x).className=(x==="pt"?"pt ":"ptf ")+col;});
  const sc=document.getElementById(scr+"-sc");
  sc.className="tb-sc "+col;
  document.getElementById(scr+"-t").textContent=ttl;
  document.getElementById(scr+"-s").textContent=sub;
  sc.textContent=scTxt;
}

// ================================================================
// 플래시카드
// ================================================================
function startFlash(lid,dtype){
  S.dtype=dtype;
  const isK=dtype==="kanji";
  const isH=dtype==="hira";
  S.col=isK?"k":"v";
  S.deck=shuf(isK?kan(lid):voc(lid));
  S.idx=0;S.flipped=false;
  S.lastFn=()=>startFlash(lid,dtype);
  const ln=LESSONS[lid];
  const ttl=isK?"📚 한자 카드":isH?"📚 히라가나→한자 카드":"📚 단어 카드";
  setTB("fl",S.col,ttl,`과${lid} ${ln.name}`,calcPct());
  if(isH){
    document.getElementById("fl-tb").style.borderBottomColor="#7B3FA0";
    document.getElementById("fl-pf").style.background="#7B3FA0";
    document.getElementById("fl-sc").style.background="#F3EBF9";
    document.getElementById("fl-sc").style.color="#7B3FA0";
  }
  showScr("flash");renderCard();
}

function calcPct(){
  const key=S.dtype==="kanji"?"k":"w";
  const pct=S.deck.length?Math.round(S.deck.filter(x=>ok(x[key])).length/S.deck.length*100):0;
  return pct+"%";
}

function renderCard(){
  const c=S.deck[S.idx];
  const isK=S.dtype==="kanji";
  const isH=S.dtype==="hira";
  const key=isK?c.k:c.w;
  document.getElementById("fl-sc").textContent=calcPct();
  document.getElementById("fl-pf").style.width=((S.idx+1)/S.deck.length*100)+"%";
  document.getElementById("fl-ctr").textContent=`${S.idx+1} / ${S.deck.length}`;

  // 앞면
  if(isH){
    // 히라가나 모드: 앞면에 히라가나만 크게
    document.getElementById("cf-fr").innerHTML=`
      <div class="c-tag" style="background:#7B3FA0;color:white">ひらがな</div>
      <div style="font-size:52px;color:#7B3FA0;font-family:'Noto Serif JP',serif;font-weight:600;line-height:1;margin-bottom:6px">${c.r}</div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--ilt);margin-top:10px">이 히라가나에 해당하는 한자는? ↻</div>`;
  } else {
    document.getElementById("cf-fr").innerHTML=`
      <div class="c-tag ${S.col}">${isK?"漢字1字":"語彙"}</div>
      <div class="c-word ${c.w?.length>4?"sm":""} ${isK?"kanji1":""}">${isK?c.k:c.w}</div>
      <div class="c-tap">탭하여 뒤집기 ↻</div>`;
  }

  // 뒷면
  const bk=document.getElementById("cf-bk");
  let rtags="";
  if(isK){
    if(c.on) rtags+=`<span class="rt rt-on">음독 ${c.on}</span>`;
    if(c.kun) rtags+=`<span class="rt rt-kun">훈독 ${c.kun}</span>`;
  }
  if(isH){
    bk.className="cf cf-bk v";
    bk.innerHTML=`
      <div class="c-tag" style="background:#7B3FA0;color:white">ひらがな</div>
      <div style="font-size:20px;color:#7B3FA0;font-family:'Noto Serif JP',serif;margin-bottom:6px">${c.r}</div>
      <div class="c-wb v" style="font-size:52px;color:var(--ink);margin-bottom:4px">${c.w}</div>
      <div class="c-mean">${c.m}</div>`;
  } else if(isK){
    bk.className="cf cf-bk k";
    bk.innerHTML=`
      <div class="c-tag k">漢字1字</div>
      <div class="c-wb k" style="font-size:54px;margin-bottom:4px">${c.k}</div>
      <div class="ko-name">${c.ko}</div>
      ${rtags?`<div class="rtags">${rtags}</div>`:""}
      ${c.hint?`<div class="hint-box"><b>💡 연상 힌트</b><br>${c.hint}</div>`:""}
      <div class="c-from">출처: ${c.from}</div>`;
  } else {
    bk.className="cf cf-bk v";
    bk.innerHTML=`
      <div class="c-tag v">語彙</div>
      <div class="c-wb v">${c.w}</div>
      <div class="c-read v">${c.r}</div>
      <div class="c-mean">${c.m}</div>`;
  }

  document.getElementById("ci").classList.toggle("flipped",S.flipped);
  document.getElementById("mark-a").style.display=S.flipped?"block":"none";
  document.getElementById("bn-p").disabled=S.idx===0;
  document.getElementById("bn-n").disabled=S.idx===S.deck.length-1;
}

function flipCard(){S.flipped=!S.flipped;renderCard();}
function prevCard(){if(S.idx>0){S.idx--;S.flipped=false;renderCard();}}
function nextCard(){if(S.idx<S.deck.length-1){S.idx++;S.flipped=false;renderCard();}}
function markWord(know){
  const c=S.deck[S.idx];
  const key=S.dtype==="vocab"?c.w:c.k;
  if(know)S.lrn[key]=true; else delete S.lrn[key];
  save();S.flipped=false;
  if(S.idx<S.deck.length-1)S.idx++;
  renderCard();
}

// ================================================================
// 퀴즈
// ================================================================
function startQ(lid,dtype,mode){
  S.dtype=dtype;S.col=dtype==="vocab"?"v":"k";
  S.lastFn=()=>startQ(lid,dtype,mode);
  S._mode=mode;S._lid=lid;
  const all=dtype==="vocab"?voc(lid):kan(lid);
  let valid=all;
  if(mode==="on") valid=all.filter(x=>x.on&&x.on.trim());
  if(mode==="kun") valid=all.filter(x=>x.kun&&x.kun.trim());
  S._all=valid;
  S.qdeck=shuf([...valid]);
  S.score=0;S.combo=0;S.maxC=0;S.tot=0;S.corr=0;S.sel=null;

  const mLabel={
    on:"음독(音読み) 퀴즈",kun:"훈독(訓読み) 퀴즈",
    read:"읽기 퀴즈",mean:"뜻 퀴즈",
    hira:"히라가나→한자 퀴즈",hiramean:"히라가나→뜻 퀴즈"
  }[mode];
  const tLabel=dtype==="vocab"?"語彙":"漢字";
  const ln=LESSONS[lid];
  setTB("qz",S.col,`${tLabel} ${mLabel}`,`과${lid} ${ln.name}`,"0점");
  // 히라가나 모드 탑바 보라색
  if(mode==="hira"||mode==="hiramean"){
    document.getElementById("qz-tb").style.borderBottomColor="#7B3FA0";
    document.getElementById("qz-pf").style.background="#7B3FA0";
    document.getElementById("qz-sc").style.background="#F3EBF9";
    document.getElementById("qz-sc").style.color="#7B3FA0";
    document.getElementById("btn-nx").style.background="#7B3FA0";
    document.getElementById("btn-nx").className="btn-nx";
  } else {
    document.getElementById("btn-nx").className="btn-nx "+S.col;
  }
  showScr("quiz");
  buildQ();
}

function smartWrong(c, all, mode, n){
  // 발음 앞글자가 같거나, 뜻 품사가 같은 것을 우선 오답으로
  const key=S.dtype==="kanji"?"k":"w";
  const pool=all.filter(x=>x[key]!==c[key]);
  let similar=[], rest=[];

  if(mode==="read"||mode==="hira"){
    similar=pool.filter(x=>x.r[0]===c.r[0]||x.r.slice(0,2)===c.r.slice(0,2));
    rest=pool.filter(x=>!similar.includes(x));
  } else if(mode==="on"){
    similar=pool.filter(x=>x.on&&c.on&&x.on[0]===c.on[0]);
    rest=pool.filter(x=>!similar.includes(x));
  } else if(mode==="kun"){
    similar=pool.filter(x=>x.kun&&c.kun&&x.kun[0]===c.kun[0]);
    rest=pool.filter(x=>!similar.includes(x));
  } else { // mean, hiramean
    const getType=w=>{
      if(w.m.endsWith("하다")||w.m.endsWith("되다")||w.r.endsWith("る")||w.r.endsWith("く")||w.r.endsWith("ぐ")||w.r.endsWith("ぬ")||w.r.endsWith("む")||w.r.endsWith("ぶ")) return "vb";
      if(w.r.endsWith("い")||w.m.endsWith("다")) return "adj";
      return "noun";
    };
    similar=pool.filter(x=>getType(x)===getType(c));
    rest=pool.filter(x=>!similar.includes(x));
  }
  const picked=[...shuf(similar),...shuf(rest)];
  return picked.slice(0,n);
}

function buildQ(){
  if(S.qdeck.length===0){showResult();return;}
  const all=S._all, mode=S._mode;
  const c=S.qdeck.pop();
  S.tot++;
  const others=smartWrong(c,all,mode,3);

  let qtype,qwTxt,qrTxt,qsTxt,correct,opts;
  const isK=S.dtype==="kanji";

  if(mode==="on"){
    qtype="음독(音読み)은?";
    qwTxt=c.k;qrTxt="";qsTxt=`훈독: ${c.kun||"—"} · 뜻: ${c.m}`;
    correct=c.on;opts=shuf([c.on,...others.map(x=>x.on||x.r||"—")]);
  } else if(mode==="kun"){
    qtype="훈독(訓読み)은?";
    qwTxt=c.k;qrTxt="";qsTxt=`음독: ${c.on||"—"} · 뜻: ${c.m}`;
    correct=c.kun;opts=shuf([c.kun,...others.map(x=>x.kun||x.r||"—")]);
  } else if(mode==="read"){
    qtype="읽기는?";
    qwTxt=c.w;qrTxt="";qsTxt=`뜻: ${c.m}`;
    correct=c.r;opts=shuf([c.r,...others.map(x=>x.r)]);
  } else if(mode==="hira"){
    // 히라가나 보고 → 한자/단어 고르기
    qtype="이 히라가나에 해당하는 단어는?";
    qwTxt=c.r;qrTxt="";qsTxt=`뜻: ${c.m}`;
    correct=c.w;opts=shuf([c.w,...others.map(x=>x.w)]);
  } else if(mode==="hiramean"){
    // 히라가나 보고 → 한글 뜻 4지선다
    qtype="히라가나를 보고 한글 뜻을 고르세요";
    qwTxt=c.r;qrTxt="";
    qsTxt=`(힌트: 한자는 「${c.w}」)`;
    correct=c.m;opts=shuf([c.m,...others.map(x=>x.m)]);
  } else {
    qtype="뜻은?";
    qwTxt=isK?c.k:c.w;qrTxt=isK?c.on:c.r;qsTxt="";
    correct=c.m;opts=shuf([c.m,...others.map(x=>x.m)]);
  }

  S.quiz={c,correct};S.sel=null;

  document.getElementById("qz-pf").style.width=(S._all.length-S.qdeck.length)/S._all.length*100+"%";
  document.getElementById("qtype").textContent=qtype;
  const qwEl=document.getElementById("qword");
  qwEl.textContent=qwTxt;
  const isHiraMode=(mode==="hira"||mode==="hiramean");
  if(isHiraMode){
    // 히라가나를 크고 선명하게 (보라색)
    qwEl.className="qword"+(qwTxt.length>6?" sm":"");
    qwEl.style.color="#7B3FA0";
    qwEl.style.fontFamily="'Noto Serif JP',serif";
  } else {
    qwEl.className="qword"+(qwTxt.length>4?" sm":"");
    qwEl.style.color="";
    qwEl.style.fontFamily="";
  }
  const qrEl=document.getElementById("qread");
  qrEl.textContent=qrTxt;
  qrEl.className="qread "+S.col;
  document.getElementById("qsub").textContent=qsTxt;
  document.getElementById("qz-sc").textContent=S.score+"점";
  document.getElementById("combo").textContent=S.combo>=3?"🔥 "+S.combo+"연속 콤보!":"";

  document.getElementById("qopts").innerHTML=opts.map(o=>
    `<button class="qopt" onclick="ansQ('${o.replace(/'/g,"\\'")}')">　${o}　</button>`
  ).join("");
  document.getElementById("qfb").style.display="none";
  document.getElementById("btn-nx").style.display="none";
}

function ansQ(ans){
  if(S.sel!==null)return;
  S.sel=ans;
  const q=S.quiz, isOk=ans===q.correct;
  const isK=S.dtype==="kanji";

  if(isOk){
    S.corr++;S.combo++;if(S.combo>S.maxC)S.maxC=S.combo;
    const bon=S.combo>=5?30:S.combo>=3?20:10;
    S.score+=bon;
    S.lrn[isK?q.c.k:q.c.w]=true;
  } else {
    S.combo=0;
    delete S.lrn[isK?q.c.k:q.c.w];
  }
  save();

  document.querySelectorAll(".qopt").forEach(b=>{
    const t=b.textContent.trim();
    if(t===q.correct)b.classList.add("correct");
    else if(t===ans&&!isOk)b.classList.add("wrong");
  });
  document.getElementById("combo").textContent=isOk&&S.combo>=3?"🔥 "+S.combo+"연속 콤보!":"";

  // 피드백
  const bon=S.combo>=5?30:S.combo>=3?20:10;
  const mode=S._mode;
  const isHiraMode=(mode==="hira"||mode==="hiramean");
  const fb=document.getElementById("qfb");
  fb.style.display="block";
  fb.style.borderLeftColor=isOk?"var(--grn)":"var(--red)";

  // 히라가나 모드 피드백: 히라가나 + 한자 + 뜻 같이 보여주기
  const feedbackDetail = isHiraMode
    ? `<div style="text-align:center;margin:6px 0">
        <span style="font-size:18px;color:#7B3FA0;font-family:'Noto Serif JP',serif">${q.c.r}</span>
        <span style="margin:0 8px;color:var(--ilt)">→</span>
        <span style="font-size:26px;font-family:'Noto Serif JP',serif;color:var(--ink);font-weight:700">${q.c.w}</span>
        <span style="margin:0 8px;color:var(--ilt)">→</span>
        <span style="font-size:18px;font-family:'Noto Sans KR',sans-serif;color:var(--grn);font-weight:700">${q.c.m}</span>
      </div>`
    : `<b>${isK?q.c.k:q.c.w}</b>　${isK?(q.c.on||"")+(q.c.kun?" / "+q.c.kun:""):q.c.r}　${q.c.m}
      ${isK?`<br><span style="color:var(--red)">음독</span> ${q.c.on||"—"}　<span style="color:#8B4A00">훈독</span> ${q.c.kun||"—"}`:""}`;

  fb.innerHTML=`<div class="qfb-t" style="color:${isOk?"var(--grn)":"var(--red)"}">
    ${isOk?"✓ 정답! +"+(isOk?bon:0)+"점":"✗ 오답!  정답: "+q.correct}
  </div>
  <div class="qfb-d">${feedbackDetail}</div>
  ${isK&&q.c.hint?`<div class="qfb-hint">💡 ${q.c.hint}</div>`:""}`;

  document.getElementById("qz-sc").textContent=S.score+"점";
  const nb=document.getElementById("btn-nx");
  nb.style.display="block";
  nb.textContent=S.qdeck.length===0?"결과 보기 →":"다음 →";

  const qc=document.getElementById("qcard");
  if(!isOk){qc.classList.add("shake");setTimeout(()=>qc.classList.remove("shake"),300);}
  else{qc.classList.add("pop");setTimeout(()=>qc.classList.remove("pop"),250);}
}

function nextQuiz(){buildQ();}

function showResult(){
  const pct=S.tot?Math.round(S.corr/S.tot*100):0;
  let em="😢",tt="더 연습해봐요!",col="var(--red)";
  if(pct>=90){em="🏆";tt="완벽해요!";col="var(--gold)"}
  else if(pct>=70){em="🎉";tt="잘했어요!";col="var(--grn)"}
  else if(pct>=50){em="💪";tt="조금만 더!"}
  document.getElementById("r-em").textContent=em;
  document.getElementById("r-tt").textContent=tt;
  document.getElementById("r-sc").textContent=S.score+"점";
  document.getElementById("r-sc").style.color=col;
  document.getElementById("r-sb").textContent=`${S.corr}/${S.tot} 정답 (${pct}%) · 최고 ${S.maxC}연속`;
  document.getElementById("btn-re").className="btn-re "+S.col;
  showScr("result");
}
function retryLast(){if(S.lastFn)S.lastFn();}
